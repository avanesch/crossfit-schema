<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossfit Kracht 8W</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff3a;
    --accent2: #ff5c3a;
    --text: #f0f0f0;
    --muted: #666;
    --success: #3aff8c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .week-badge {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* NAV */
  nav {
    display: flex;
    overflow-x: auto;
    padding: 12px 16px;
    gap: 8px;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* CONTENT */
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* SESSION CARD */
  .session-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .session-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: #222;
  }

  .session-tag {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent);
  }

  .session-title {
    font-weight: 600;
    font-size: 15px;
  }

  .session-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* EXERCISE */
  .exercise {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  .exercise:last-child { border-bottom: none; }

  .ex-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .ex-name {
    font-weight: 600;
    font-size: 15px;
  }

  .ex-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .tag-main { background: rgba(232,255,58,0.15); color: var(--accent); }
  .tag-acc { background: rgba(255,92,58,0.15); color: var(--accent2); }

  .ex-scheme {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .sets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }

  .set-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .set-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
  }

  .weight-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    width: 100%;
    padding: 2px 0;
    outline: none;
    transition: border-color 0.2s;
  }
  .weight-input:focus { border-color: var(--accent); }
  .weight-input::placeholder { color: #333; }

  .set-unit { font-size: 11px; color: var(--muted); }

  .done-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
  .done-btn.completed {
    background: rgba(58,255,140,0.12);
    border-color: var(--success);
    color: var(--success);
  }

  /* PROGRESS BAR */
  .week-progress {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .week-progress h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    color: var(--accent);
  }
  .prog-bar-bg {
    background: var(--surface);
    border-radius: 4px;
    height: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  /* NOTES */
  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px;
    width: 100%;
    min-height: 70px;
    resize: vertical;
    outline: none;
    margin-top: 10px;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 10px; display: block; }

  .section-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 10px 16px 0;
  }
</style>
</head>

// ===================== STATE =====================
let currentWeek = 0;
let data = {};

function saveData() {
  try { localStorage.setItem('cfkracht_v2', JSON.stringify(data)); } catch(e) {}
}

function loadData() {
  try {
    const s = localStorage.getItem('cfkracht_v2');
    if (s) data = JSON.parse(s);
  } catch(e) { data = {}; }
}

function getKey(week, session, exIdx, setIdx) {
  return `w${week}_s${session}_e${exIdx}_set${setIdx}`;
}
function getDoneKey(week, session, exIdx) {
  return `done_w${week}_s${session}_e${exIdx}`;
}
function getNotesKey(week, session) {
  return `notes_w${week}_s${session}`;
}

// ===================== RENDER =====================
function renderNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  program.weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === currentWeek ? ' active' : '');
    btn.textContent = `W${w.week}`;
    btn.onclick = () => { currentWeek = i; renderAll(); };
    nav.appendChild(btn);
  });
}

function calcProgress() {
  const week = program.weeks[currentWeek];
  let total = 0, done = 0;
  week.sessions.forEach((sess, si) => {
    sess.exercises.forEach((ex, ei) => {
      total++;
      const k = getDoneKey(currentWeek, si, ei);
      if (data[k]) done++;
    });
  });
  return { total, done };
}

function renderAll() {
  renderNav();
  const week = program.weeks[currentWeek];
  document.getElementById('headerWeek').textContent = `WEEK ${week.week}`;

  const { total, done } = calcProgress();
  const pct = total ? Math.round((done / total) * 100) : 0;

  let html = `
    <div class="week-progress">
      <h3>WEEK ${week.week} — ${week.focus}</h3>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="prog-label"><span>${done}/${total} oefeningen klaar</span><span>${pct}%</span></div>
    </div>
  `;

  week.sessions.forEach((sess, si) => {
    html += `
      <div class="session-block">
        <div class="session-header">
          <div>
            <div class="session-tag">SESSIE ${sess.id}</div>
            <div class="session-title">${sess.title}</div>
            <div class="session-meta">⏱ ${sess.duration}</div>
          </div>
        </div>
        <div class="section-divider">MAIN LIFTS</div>
    `;

    let lastType = 'main';
    sess.exercises.forEach((ex, ei) => {
      if (ex.type === 'acc' && lastType === 'main') {
        html += `<div class="section-divider">ACCESSORY WORK</div>`;
        lastType = 'acc';
      }
      const doneKey = getDoneKey(currentWeek, si, ei);
      const isDone = !!data[doneKey];
      const tagClass = ex.type === 'main' ? 'tag-main' : 'tag-acc';
      const tagLabel = ex.type === 'main' ? 'Main' : 'Accessory';

      html += `<div class="exercise" id="ex_${si}_${ei}">
        <div class="ex-header">
          <div class="ex-name">${ex.name}</div>
          <span class="ex-tag ${tagClass}">${tagLabel}</span>
        </div>
        <div class="ex-scheme">${ex.scheme}</div>
        <div class="sets-grid">`;

      for (let s = 0; s < ex.sets; s++) {
        const k = getKey(currentWeek, si, ei, s);
        const val = data[k] || '';
        html += `<div class="set-row">
          <div class="set-label">Set ${s + 1} · ${ex.reps} reps</div>
          <input class="weight-input" type="number" inputmode="decimal" placeholder="0"
            value="${val}"
            data-key="${k}"
            onchange="saveWeight(this)"
            onfocus="this.select()">
          <div class="set-unit">kg</div>
        </div>`;
      }

      html += `</div>
        <button class="done-btn ${isDone ? 'completed' : ''}" onclick="toggleDone(${si},${ei})">
          ${isDone ? '✓ Klaar' : '○ Markeer klaar'}
        </button>
      </div>`;
    });

    const notesKey = getNotesKey(currentWeek, si);
    const notesVal = data[notesKey] || '';
    html += `
      <div class="exercise">
        <span class="notes-label">📝 SESSIE NOTITIES</span>
        <textarea class="notes-area" placeholder="Hoe voelde het? PR's? Blessures?" data-key="${notesKey}" onchange="saveNotes(this)">${notesVal}</textarea>
      </div>
      </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

function saveWeight(el) {
  data[el.dataset.key] = el.value;
  saveData();
}

function saveNotes(el) {
  data[el.dataset.key] = el.value;
  saveData();
}

function toggleDone(si, ei) {
  const k = getDoneKey(currentWeek, si, ei);
  data[k] = !data[k];
  saveData();
  renderAll();
  // Scroll preservation
  document.getElementById(`ex_${si}_${ei}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===================== BOOT =====================
loadData();
renderAll();
</script>
</body>
</html>
